<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f6f8fa;
    }

    .wrap {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      overflow: hidden;
      width: 100%; max-width: 900px; box-sizing: border-box; margin: 0 auto;
    }

    .header {
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Segoe UI', sans-serif;
      color: #24292f;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <span
        style="background:#388bfd;border-radius:4px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:white;">⊞</span>
      Fig 4 — MCAS Descriptor Object Graph (3-word MCAS)
    </div>
    <svg width="100%" height="100%" viewBox="0 0 900 470" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
          orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </marker>
      </defs>

      <!-- ===== mcas_desc (center top) ===== -->
      <rect x="310" y="30" width="280" height="120" rx="10" fill="#ffffff" stroke="#005cc5" stroke-width="2" />
      <text x="450" y="52" text-anchor="middle" fill="#005cc5" font-family="'Courier New',monospace" font-size="13"
        font-weight="bold">mcas_desc</text>
      <line x1="310" y1="60" x2="590" y2="60" stroke="#d0d7de" stroke-width="0.8" />
      <text x="325" y="76" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">status</text>
      <rect x="430" y="63" width="140" height="20" rx="3" fill="#fff3e0" stroke="#e36209" stroke-width="1" />
      <text x="500" y="77" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace"
        font-size="12">Active</text>

      <line x1="310" y1="86" x2="590" y2="86" stroke="#d0d7de" stroke-width="0.8" />
      <text x="325" y="102" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">words</text>
      <text x="500" y="102" text-anchor="middle" fill="#032f62" font-family="'Courier New',monospace" font-size="12">[
        wd₀, wd₁, wd₂ ]</text>

      <line x1="310" y1="110" x2="590" y2="110" stroke="#d0d7de" stroke-width="0.8" />
      <text x="325" y="126" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">retired</text>
      <text x="500" y="126" text-anchor="middle" fill="#032f62" font-family="'Courier New',monospace"
        font-size="12">false</text>
      <text x="450" y="142" text-anchor="middle" fill="#555" font-family="'Segoe UI',sans-serif" font-size="10">Atomic.t
        fields</text>

      <!-- ===== word_desc boxes ===== -->
      <!-- wd₀ -->
      <rect x="20" y="230" width="240" height="150" rx="10" fill="#f6f8fa" stroke="#6f42c1" stroke-width="1.5" />
      <text x="140" y="252" text-anchor="middle" fill="#6f42c1" font-family="'Courier New',monospace" font-size="12"
        font-weight="bold">word_desc wd₀</text>
      <line x1="20" y1="260" x2="260" y2="260" stroke="#d0d7de" stroke-width="0.8" />

      <text x="35" y="278" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">address</text>
      <rect x="105" y="265" width="145" height="20" rx="3" fill="#fff3e0" stroke="#e36209" stroke-width="1" />
      <text x="178" y="279" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace"
        font-size="11">&(cell₀)</text>

      <line x1="20" y1="288" x2="260" y2="288" stroke="#d0d7de" stroke-width="0.8" />
      <text x="35" y="304" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">old_value</text>
      <text x="160" y="304" fill="#24292f" font-family="'Courier New',monospace" font-size="11">Obj.repr v₀</text>
      <line x1="20" y1="312" x2="260" y2="312" stroke="#d0d7de" stroke-width="0.8" />
      <text x="35" y="328" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">new_value</text>
      <text x="160" y="328" fill="#24292f" font-family="'Courier New',monospace" font-size="11">Obj.repr v₀'</text>
      <line x1="20" y1="336" x2="260" y2="336" stroke="#d0d7de" stroke-width="0.8" />
      <text x="35" y="352" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">parent</text>
      <text x="155" y="352" fill="#005cc5" font-family="'Courier New',monospace" font-size="11">→ mcas_desc</text>
      <line x1="20" y1="360" x2="260" y2="360" stroke="#d0d7de" stroke-width="0.8" />
      <text x="35" y="372" fill="#555" font-family="'Segoe UI',sans-serif" font-size="10">address = target cell
        addr</text>

      <!-- wd₁ -->
      <rect x="330" y="230" width="240" height="150" rx="10" fill="#f6f8fa" stroke="#6f42c1" stroke-width="1.5" />
      <text x="450" y="252" text-anchor="middle" fill="#6f42c1" font-family="'Courier New',monospace" font-size="12"
        font-weight="bold">word_desc wd₁</text>
      <line x1="330" y1="260" x2="570" y2="260" stroke="#d0d7de" stroke-width="0.8" />

      <text x="345" y="278" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">address</text>
      <rect x="415" y="265" width="145" height="20" rx="3" fill="#fff3e0" stroke="#e36209" stroke-width="1" />
      <text x="488" y="279" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace"
        font-size="11">&(cell₁)</text>

      <line x1="330" y1="288" x2="570" y2="288" stroke="#d0d7de" stroke-width="0.8" />
      <text x="345" y="304" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">old_value</text>
      <text x="470" y="304" fill="#24292f" font-family="'Courier New',monospace" font-size="11">Obj.repr v₁</text>
      <line x1="330" y1="312" x2="570" y2="312" stroke="#d0d7de" stroke-width="0.8" />
      <text x="345" y="328" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">new_value</text>
      <text x="470" y="328" fill="#24292f" font-family="'Courier New',monospace" font-size="11">Obj.repr v₁'</text>
      <line x1="330" y1="336" x2="570" y2="336" stroke="#d0d7de" stroke-width="0.8" />
      <text x="345" y="352" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">parent</text>
      <text x="465" y="352" fill="#005cc5" font-family="'Courier New',monospace" font-size="11">→ mcas_desc</text>
      <line x1="330" y1="360" x2="570" y2="360" stroke="#d0d7de" stroke-width="0.8" />
      <text x="345" y="372" fill="#555" font-family="'Segoe UI',sans-serif" font-size="10">address = target cell
        addr</text>

      <!-- wd₂ -->
      <rect x="640" y="230" width="240" height="150" rx="10" fill="#f6f8fa" stroke="#6f42c1" stroke-width="1.5" />
      <text x="760" y="252" text-anchor="middle" fill="#6f42c1" font-family="'Courier New',monospace" font-size="12"
        font-weight="bold">word_desc wd₂</text>
      <line x1="640" y1="260" x2="880" y2="260" stroke="#d0d7de" stroke-width="0.8" />

      <text x="655" y="278" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">address</text>
      <rect x="725" y="265" width="145" height="20" rx="3" fill="#fff3e0" stroke="#e36209" stroke-width="1" />
      <text x="798" y="279" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace"
        font-size="11">&(cell₂)</text>

      <line x1="640" y1="288" x2="880" y2="288" stroke="#d0d7de" stroke-width="0.8" />
      <text x="655" y="304" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">old_value</text>
      <text x="780" y="304" fill="#24292f" font-family="'Courier New',monospace" font-size="11">Obj.repr v₂</text>
      <line x1="640" y1="312" x2="880" y2="312" stroke="#d0d7de" stroke-width="0.8" />
      <text x="655" y="328" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">new_value</text>
      <text x="780" y="328" fill="#24292f" font-family="'Courier New',monospace" font-size="11">Obj.repr v₂'</text>
      <line x1="640" y1="336" x2="880" y2="336" stroke="#d0d7de" stroke-width="0.8" />
      <text x="655" y="352" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">parent</text>
      <text x="775" y="352" fill="#005cc5" font-family="'Courier New',monospace" font-size="11">→ mcas_desc</text>
      <line x1="640" y1="360" x2="880" y2="360" stroke="#d0d7de" stroke-width="0.8" />
      <text x="655" y="372" fill="#555" font-family="'Segoe UI',sans-serif" font-size="10">address = target cell
        addr</text>

      <!-- Arrows from mcas_desc.words down to word_descs -->
      <line x1="400" y1="150" x2="140" y2="230" stroke="#6f42c1" stroke-width="1.5" marker-end="url(#arr)" />
      <line x1="450" y1="150" x2="450" y2="230" stroke="#6f42c1" stroke-width="1.5" marker-end="url(#arr)" />
      <line x1="500" y1="150" x2="760" y2="230" stroke="#6f42c1" stroke-width="1.5" marker-end="url(#arr)" />

      <!-- Parent back-pointers (dashed blue) -->
      <path d="M140 380 Q140 415 395 415 Q400 390 400 152" fill="none" stroke="#005cc5" stroke-width="1"
        stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.55" />
      <path d="M450 380 Q450 395 450 152" fill="none" stroke="#005cc5" stroke-width="1" stroke-dasharray="4 3"
        marker-end="url(#arr)" opacity="0.55" />
      <path d="M760 380 Q760 415 505 415 Q500 390 500 152" fill="none" stroke="#005cc5" stroke-width="1"
        stroke-dasharray="4 3" marker-end="url(#arr)" opacity="0.55" />

      <!-- address arrows pointing right to where cells live (off-right) -->
      <!-- annotate that cells are the Atomic.t inside each 'a ref -->
      <!-- <rect x="250" y="162" width="400" height="48" rx="7" fill="#f6f8fa" stroke="#e36209" stroke-width="1"/>
    <text x="450" y="182" text-anchor="middle" fill="#e36209" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600">cell = (state Atomic.t)  inside  'a ref</text>
    <text x="450" y="200" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">address field holds the Atomic.t itself (r.cell), not a pointer-to-pointer</text> -->

      <!-- Legend -->
      <rect x="20" y="435" width="860" height="26" rx="5" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5" />
      <line x1="40" y1="448" x2="80" y2="448" stroke="#6f42c1" stroke-width="1.5" marker-end="url(#arr)" />
      <text x="86" y="452" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">words[] ptr</text>
      <line x1="190" y1="448" x2="230" y2="448" stroke="#005cc5" stroke-width="1" stroke-dasharray="4 3"
        marker-end="url(#arr)" />
      <text x="236" y="452" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">parent back-ptr</text>
      <text x="420" y="452" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">During MCAS, cell content
        = Word wd; logical_value resolves to old/new_value on read</text>
    </svg>
  </div>
</body>

</html>
