<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f6f8fa; padding: 0; }
  .wrap { background: #ffffff; border: 1px solid #d0d7de; border-radius: 12px; overflow: hidden; width: 100%; max-width: 900px; box-sizing: border-box; margin: 0 auto; }
  .header {
    background: #f6f8fa;
    border-bottom: 1px solid #d0d7de;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'Segoe UI', sans-serif;
    color: #24292f; font-size: 14px; font-weight: 500;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="background:#6e40c9;border-radius:4px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:white;">▶</span>
    Fig 2 — Thread Helping Protocol (read_internal)
  </div>
  <svg width="100%" height="100%" viewBox="0 0 900 440" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Thread columns -->
    <!-- Thread A (initiator) -->
    <rect x="50" y="50" width="150" height="44" rx="8" fill="#ffffff" stroke="#005cc5" stroke-width="1.5"/>
    <text x="125" y="72" text-anchor="middle" fill="#005cc5" font-family="'Courier New',monospace" font-size="13" font-weight="bold">Thread A</text>
    <text x="125" y="86" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">MCAS initiator</text>
    <line x1="125" y1="94" x2="125" y2="410" stroke="#005cc5" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

    <!-- Thread B (reader/helper) -->
    <rect x="370" y="50" width="160" height="44" rx="8" fill="#1e2e1a" stroke="#1a7f37" stroke-width="1.5"/>
    <text x="450" y="72" text-anchor="middle" fill="#1a7f37" font-family="'Courier New',monospace" font-size="13" font-weight="bold">Thread B</text>
    <text x="450" y="86" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">reader / helper</text>
    <line x1="450" y1="94" x2="450" y2="410" stroke="#1a7f37" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

    <!-- Memory cell -->
    <rect x="700" y="50" width="150" height="44" rx="8" fill="#fff3e0" stroke="#e36209" stroke-width="1.5"/>
    <text x="775" y="72" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace" font-size="13" font-weight="bold">Cell addr</text>
    <text x="775" y="86" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">Atomic.t</text>
    <line x1="775" y1="94" x2="775" y2="410" stroke="#e36209" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>

    <!-- Step 1: A installs Word descriptor -->
    <text x="30" y="132" fill="#6e6e6e" font-family="'Segoe UI',sans-serif" font-size="11">①</text>
    <line x1="125" y1="128" x2="770" y2="128" stroke="#005cc5" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="230" y="115" width="280" height="22" rx="4" fill="#ffffff"/>
    <text x="370" y="130" text-anchor="middle" fill="#005cc5" font-family="'Segoe UI',sans-serif" font-size="12">CAS(addr, Value v, Word wd)</text>

    <!-- Cell state changes -->
    <rect x="720" y="140" width="110" height="28" rx="5" fill="#fff3e0" stroke="#e36209" stroke-width="1"/>
    <text x="775" y="157" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace" font-size="12">Word wd</text>

    <!-- Step 2: B reads addr -->
    <text x="30" y="192" fill="#6e6e6e" font-family="'Segoe UI',sans-serif" font-size="11">②</text>
    <line x1="450" y1="188" x2="775" y2="188" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="530" y="175" width="160" height="22" rx="4" fill="#ffffff"/>
    <text x="610" y="190" text-anchor="middle" fill="#1a7f37" font-family="'Segoe UI',sans-serif" font-size="12">Atomic.get addr</text>

    <!-- B sees Word -->
    <line x1="775" y1="210" x2="450" y2="210" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5 3"/>
    <rect x="530" y="198" width="160" height="22" rx="4" fill="#ffffff"/>
    <text x="610" y="212" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">sees Word wd</text>

    <!-- Step 3: B helps A -->
    <text x="30" y="252" fill="#6e6e6e" font-family="'Segoe UI',sans-serif" font-size="11">③</text>
    <rect x="330" y="238" width="240" height="28" rx="6" fill="#ffffff" stroke="#005cc5" stroke-width="1"/>
    <text x="450" y="257" text-anchor="middle" fill="#005cc5" font-family="'Segoe UI',sans-serif" font-size="12">B calls mcas_desc(wd.parent)</text>
    <text x="370" y="278" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">↳ helps A complete its MCAS (not_self = true, status = Active)</text>

    <!-- Step 4: status updated -->
    <text x="30" y="318" fill="#6e6e6e" font-family="'Segoe UI',sans-serif" font-size="11">④</text>
    <line x1="200" y1="314" x2="440" y2="314" stroke="#6f42c1" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="215" y="302" width="200" height="22" rx="4" fill="#ffffff"/>
    <text x="315" y="317" text-anchor="middle" fill="#6f42c1" font-family="'Segoe UI',sans-serif" font-size="12">CAS(status, Active, Successful)</text>

    <!-- Step 5: B retries, gets logical value -->
    <text x="30" y="360" fill="#6e6e6e" font-family="'Segoe UI',sans-serif" font-size="11">⑤</text>
    <line x1="450" y1="356" x2="775" y2="356" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="490" y="344" width="220" height="22" rx="4" fill="#ffffff"/>
    <text x="600" y="358" text-anchor="middle" fill="#1a7f37" font-family="'Segoe UI',sans-serif" font-size="12">retry → logical_value(wd)</text>

    <!-- Step 6: returns new_value -->
    <line x1="775" y1="378" x2="450" y2="378" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5 3"/>
    <rect x="540" y="366" width="160" height="22" rx="4" fill="#ffffff"/>
    <text x="620" y="380" text-anchor="middle" fill="#1a7f37" font-family="'Segoe UI',sans-serif" font-size="12">returns new_value</text>

    <!-- footnote -->
    <rect x="30" y="405" width="840" height="24" rx="5" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
    <text x="450" y="420" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">Key invariant: any thread reading a Word descriptor must help the owner complete before returning a value — guarantees wait-freedom of reads</text>
  </svg>
</div>
</body>
</html>
