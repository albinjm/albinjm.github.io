<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f6f8fa; padding: 0; }
  .wrap { background: #ffffff; border: 1px solid #d0d7de; border-radius: 12px; overflow: hidden; width: 100%; max-width: 900px; box-sizing: border-box; margin: 0 auto; }
  .header {
    background: #f6f8fa;
    border-bottom: 1px solid #d0d7de;
    padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'Segoe UI', sans-serif;
    color: #24292f; font-size: 14px; font-weight: 500;
  }
  .title-icon { width: 20px; height: 20px; background: #1f6feb; border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size:11px; color:white; }
  svg { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title-icon">◈</div>
    Fig 1 — Cell State Machine &amp; MCAS Status Transitions
  </div>
  <svg width="100%" height="100%" viewBox="0 0 900 420" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- === LEFT PANEL: Cell state === -->
    <!-- Panel label -->
    <text x="200" y="32" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12" letter-spacing="1">CELL STATE</text>

    <!-- Value state -->
    <rect x="50" y="50" width="300" height="58" rx="10" fill="#1a2e1a" stroke="#1a7f37" stroke-width="1.5"/>
    <text x="200" y="75" text-anchor="middle" fill="#1a7f37" font-family="'Courier New',monospace" font-size="14" font-weight="bold">Value v</text>
    <text x="200" y="96" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">Normal state — holds concrete value</text>

    <!-- Arrow down -->
    <line x1="200" y1="108" x2="200" y2="158" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="215" y="138" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">CAS installs descriptor</text>

    <!-- Word state -->
    <rect x="50" y="158" width="300" height="80" rx="10" fill="#ffffff" stroke="#005cc5" stroke-width="1.5"/>
    <text x="200" y="183" text-anchor="middle" fill="#005cc5" font-family="'Courier New',monospace" font-size="14" font-weight="bold">Word wd</text>
    <text x="200" y="203" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">wd.parent = mcas_desc</text>
    <text x="200" y="222" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">Acquired — MCAS in progress</text>

    <!-- Arrow down to logical read -->
    <line x1="200" y1="238" x2="200" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="215" y="265" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">logical_value(wd)</text>

    <!-- Logical value split -->
    <rect x="50" y="285" width="130" height="55" rx="8" fill="#2e1a1a" stroke="#d73a49" stroke-width="1.2"/>
    <text x="115" y="308" text-anchor="middle" fill="#d73a49" font-family="'Courier New',monospace" font-size="13" font-weight="bold">old_value</text>
    <text x="115" y="328" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">status = Failed</text>

    <rect x="220" y="285" width="130" height="55" rx="8" fill="#0d2a18" stroke="#1a7f37" stroke-width="1.2"/>
    <text x="285" y="308" text-anchor="middle" fill="#1a7f37" font-family="'Courier New',monospace" font-size="13" font-weight="bold">new_value</text>
    <text x="285" y="328" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">status = Successful</text>

    <!-- lines to split -->
    <line x1="200" y1="285" x2="115" y2="285" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
    <line x1="200" y1="285" x2="285" y2="285" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

    <!-- return arrow -->
    <path d="M35 312 Q20 312 20 200 Q20 108 49 78" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="4 3"/>
    <text x="10" y="200" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11" transform="rotate(-90,10,200)">cleanup / retire</text>

    <!-- === DIVIDER === -->
    <line x1="420" y1="20" x2="420" y2="400" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- === RIGHT PANEL: MCAS status FSM === -->
    <text x="670" y="32" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12" letter-spacing="1">MCAS STATUS FSM</text>

    <!-- Active -->
    <rect x="555" y="55" width="230" height="58" rx="10" fill="#fff3e0" stroke="#e36209" stroke-width="2"/>
    <text x="670" y="78" text-anchor="middle" fill="#e36209" font-family="'Courier New',monospace" font-size="15" font-weight="bold">Active</text>
    <text x="670" y="100" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">Initial — acquiring words</text>

    <!-- Arrow to Successful -->
    <line x1="600" y1="113" x2="575" y2="205" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="553" y="165" fill="#1a7f37" font-family="'Segoe UI',sans-serif" font-size="11">all acquired</text>

    <!-- Arrow to Failed -->
    <line x1="740" y1="113" x2="760" y2="205" stroke="#d73a49" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="748" y="165" fill="#d73a49" font-family="'Segoe UI',sans-serif" font-size="11">any failed</text>

    <!-- Successful -->
    <rect x="450" y="205" width="180" height="58" rx="10" fill="#0d2a18" stroke="#1a7f37" stroke-width="1.5"/>
    <text x="540" y="230" text-anchor="middle" fill="#1a7f37" font-family="'Courier New',monospace" font-size="14" font-weight="bold">Successful</text>
    <text x="540" y="250" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">new_values visible</text>

    <!-- Failed -->
    <rect x="700" y="205" width="180" height="58" rx="10" fill="#2e1a1a" stroke="#d73a49" stroke-width="1.5"/>
    <text x="790" y="230" text-anchor="middle" fill="#d73a49" font-family="'Courier New',monospace" font-size="14" font-weight="bold">Failed</text>
    <text x="790" y="250" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">old_values restored</text>

    <!-- Note: terminal states -->
    <rect x="550" y="310" width="240" height="50" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <text x="670" y="333" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">Terminal states — only Active</text>
    <text x="670" y="350" text-anchor="middle" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="12">→ {Successful,Failed} via single CAS</text>

    <line x1="540" y1="263" x2="600" y2="310" stroke="#555" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
    <line x1="790" y1="263" x2="740" y2="310" stroke="#555" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>

    <!-- legend -->
    <rect x="440" y="380" width="440" height="26" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="0.5"/>
    <text x="465" y="397" fill="#6e7781" font-family="'Segoe UI',sans-serif" font-size="11">● Status updated with single Atomic.compare_and_set — exactly one thread commits</text>
  </svg>
</div>
</body>
</html>
